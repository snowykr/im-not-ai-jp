prompt = """
直近のHumanize Japanese結果を、ユーザーの調整指示に沿ってもう一度整えてください。

調整指示:
{{args}}

動作:
1. 現在のディレクトリ(cwd)の`_workspace/`から最新の`final.md`または`01_input.txt`を探します。なければ「前回の実行がありません。/humanize-japaneseから始めてください」と返します。
2. 指示を解釈します:
   - カテゴリ指定（例: 翻訳調だけ、丁寧体だけ）なら該当箇所のみ再編集
   - 段落指定ならその範囲のみ再編集
   - 強度調整なら控えめ/標準/強めを反映
   - 指示なしなら残っているAIっぽい箇所全体を対象
3. 意味、固有名詞、数値、日付、引用を保って再編集します。
4. 変更比較と自己検証結果を返します。
"""
